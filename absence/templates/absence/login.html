{% extends "absence/auth_shell.html" %}
{% block title %}Connexion{% endblock %}
{% block content %}
<div class="auth-card">
    <div class="auth-header">
        <span class="logo-mark lg">A</span>
        <h1>Connexion</h1>
        <p class="text-muted small">Identifiez-vous pour accéder à l’application.</p>
    </div>
    {% if form.errors %}
        <p class="form-error">Identifiant ou mot de passe incorrect.</p>
    {% endif %}
    <form method="post" action="{% url 'login' %}" class="stack-form">
        {% csrf_token %}
        {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
        <label for="id_username">Nom d’utilisateur</label>
        <input type="text" name="username" id="id_username" required autofocus autocomplete="username" class="input">
        <label for="id_password">Mot de passe</label>
        <input type="password" name="password" id="id_password" required autocomplete="current-password" class="input">
        <button type="submit" class="btn btn-primary btn-block">Se connecter</button>
    </form>
</div>
{% endblock %}
